{% extends 'master.html' %} {% block content %}
<h1>A Fancy Table</h1>

<table>
  <tr>
    <th>Book Name</th>
    <th>Author</th>
    <th>Publish Date</th>
    <th>Created at</th>
  </tr>
  
  {% for book in book %}
  <tr>
    <td>{{book.BookName}}</td>
    <td>{{book.Author}}</td>
    <td>{{book.Publish_date}}</td>
    <td>{{book.created_at}}</td>
    
  </tr>
  {% endfor %}
    
</table>
{% endblock content %}
