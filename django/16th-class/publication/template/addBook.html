{% extends 'master.html' %} {% block content %}

<style>
    form {
        border-radius: 5px;
        background-color: #f2f2f2;
        padding: 20px;
    }

    label {
        display: block;
    }

    input[type="text"],
    select {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        display: inline-block;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }

    input[type="submit"] {
        width: 100%;
        background-color: #4caf50;
        color: white;
        padding: 14px;
        margin: 8px 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    input[type="submit"]:hover {
        background-color: #45a049;
    }
</style>

<h2>Style an HTML Form with CSS</h2>

<form action="{% url 'addBook' %}", method="POST">
    {% csrf_token %}
    <label for="bookName">Book Name</label>
    <input type="text" id="bookName" name="bookName" placeholder="Your book name.." />

    <label for="author">Author</label>
    <input type="text" id="author" name="author" placeholder="author name.." />

    <label for="publishDate">Published Date</label>
    <input type="date" id="publishDate" name="publishDate"  />

    

    <input type="submit" value="Add Book" />
</form>
{% endblock content %}
