{% extends 'master.html' %}


{% block content %}
<h2>Update Student</h2>



<form action="{% url 'editStudent' student.id %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <label for="profilePicture">Profile Picture</label>
    
    {% if student.ProfilePicture %}
        <img src="{{student.ProfilePicture.url}}" width="70px" alt="">
    {% endif %}
        
    <input type="file" id="profilePicture" name="profilePicture" >

    <label for="fname">Student ID</label>
    <input type="text" id="fname" name="stuID" value="{{student.id}}" placeholder="Your name.." readonly>

    <label for="fname">First Name</label>
    <input type="text" id="fname" name="firstname" value="{{student.FirstName}}" placeholder="Your name..">

    <label for="lname">Last Name</label>
    <input type="text" id="lname" name="lastname" value="{{student.LastName}}" placeholder="Your last name..">

    <label for="department">Department</label>
    <input type="text" id="department" name="department" value="{{student.Department}}" placeholder="Your department..">

    <label for="city">City</label>
    <input type="text" id="city" name="city" value="{{student.City}}" placeholder="Your city..">

    <input type="submit" value="Update Student">
</form>

{% endblock content %}
