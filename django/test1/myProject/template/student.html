{% extends 'master.html' %}


{% block content %}
<h1>student Table</h1>


<table>
    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Department</th>
        <th>City</th>
        <th>Action</th>
    </tr>

    {% for i in stuData %}
    <tr>
        <td>{{i.FirstName}}</td>
        <td>{{i.LastName}}</td>
        <td>{{i.Department}}</td>
        <td>{{i.City}}</td>
        <td>
            <a href="{% url 'deleteStudent' i.id %}">Delete</a>
            <a href="{% url 'editStudent' i.id %}">Edit</a>
            <a href="{% url 'viewStudent' i.id %}">View</a>
            
        </td>
        
    </tr>
    {% endfor %}

</table>
{% endblock content %}
