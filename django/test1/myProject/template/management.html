{% extends 'master.html' %}


{% block content %}
<h1>Management Table</h1>


<table>
    <tr>
        <th>Name</th>
        <th>Designation</th>
        <th>Adress</th>
        
    </tr>

    {% for i in management %}
    <tr>
        <td>{{i.Name}}</td>
        <td>{{i.Designation}}</td>
        <td>{{i.Address}}</td>
       
        
    </tr>
    {% endfor %}

</table>
{% endblock content %}
