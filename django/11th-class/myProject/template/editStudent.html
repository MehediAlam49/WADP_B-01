{% extends 'master.html' %}


{% block content %}
<h2>Update Student</h2>

<form action="{% url 'updateStudent' %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <label for="stdID">Student ID</label>
    <input type="text" id="stdID" name="stdID" value="{{student.id}}" placeholder="Your name.." readonly>
   
    <label for="fname">First Name</label>
    <input type="text" id="fname" value="{{student.FirstName}}" name="firstname" placeholder="Your name..">

    <label for="lname">Last Name</label>
    <input type="text" id="lname" name="lastname" value="{{student.LastName}}" placeholder="Your last name..">

    <label for="department">Department</label>
    <input type="text" id="department" name="department" value="{{student.Department}}" placeholder="Your department..">

    <label for="city">City</label>
    <input type="text" id="city" name="city" value="{{student.City}}" placeholder="Your city..">

    <label for="city">Profile Image</label>
    <input type="hidden" id="prevImage" value="{{student.ProfileImage}}" name="prevImage" >
    <input type="file" id="profileImage" name="profileImage" >

    

    <input type="submit" value="Update Student">
</form>
{% endblock content %}
