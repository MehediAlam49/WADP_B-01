{% extends 'master.html' %}


{% block content %}
<div class="container">
    <table class="table">
        <thead>
            <tr>
                <th scope="col">Profile Picture</th>
                <th scope="col">Full Name</th>
                <th scope="col">Phone</th>
                <th scope="col">Email</th>
                <th scope="col">Action</th>
                
            </tr>
        </thead>
        <tbody>
            
            {% for i in resumeData %}
                <tr>
                
                <td>
                    <img src="{{i.ProfilePicture}}" width="70px" alt="">
                </td>
                <td>{{i.FullName}}</td>
                <td>{{i.Phone}}</td>
                <td>@{{i.Email}}</td>
                <td>
                    <a href="{% url 'editResume' i.id %}">Edit</a>
                    <a href="{% url 'deleteResume' i.id %}">Delete</a>
                    <a href="{% url 'viewResume' i.id %}">View</a>
                </td>
            </tr>
            {% endfor %}
                
            
        </tbody>
    </table>
</div>
{% endblock content %}
