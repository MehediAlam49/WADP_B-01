{% extends 'master.html' %}


{% block content %}
    <h1>Student Data</h1>

<table>
  <tr>
    <th>First Name</th>
    <th>Last Name</th>
    <th>Department</th>
    <th>City</th>
  </tr>
  
  {% for i in stuData %}
    <tr>
    <td>{{i.FirstName}}</td>
    <td>{{i.LastName}}</td>
    <td>{{i.Department}}</td>
    <td>{{i.City}}</td>
    
  </tr>
  {% endfor %}
    
  
</table>
{% endblock content %}
